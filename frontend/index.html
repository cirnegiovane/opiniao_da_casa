<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opinião da Casa</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0e0e0e;
        --surface: #181818;
        --border: #2a2a2a;
        --accent: #e8ff47;
        --accent2: #ff6b35;
        --text: #f0f0f0;
        --muted: #666;
        --filme: #4da6ff;
        --livro: #a78bfa;
        --jogo: #34d399;
        --serie: #fb923c;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-weight: 300;
        min-height: 100vh;
      }

      header {
        border-bottom: 1px solid var(--border);
        padding: 2rem 2.5rem;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        letter-spacing: 0.04em;
        line-height: 1;
      }

      .logo span {
        color: var(--accent);
      }

      .header-stats {
        display: flex;
        gap: 2rem;
        font-size: 0.75rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .stat strong {
        display: block;
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.8rem;
        color: var(--text);
        letter-spacing: 0.05em;
      }

      .toolbar {
        padding: 1.5rem 2.5rem;
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: center;
        border-bottom: 1px solid var(--border);
      }

      select,
      input[type="text"],
      input[type="number"] {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 0.6rem 1rem;
        font-family: "DM Sans", sans-serif;
        font-size: 0.85rem;
        outline: none;
        transition: border-color 0.2s;
        appearance: none;
        cursor: pointer;
      }

      select:focus,
      input:focus {
        border-color: var(--accent);
      }

      .btn {
        padding: 0.6rem 1.4rem;
        font-family: "DM Sans", sans-serif;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: all 0.15s;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .btn-primary {
        background: var(--accent);
        color: #0e0e0e;
      }
      .btn-primary:hover {
        background: #d4eb00;
      }
      .btn-ghost {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
      }
      .btn-ghost:hover {
        border-color: var(--text);
        color: var(--text);
      }
      .btn-danger {
        background: transparent;
        border: 1px solid transparent;
        color: var(--muted);
        padding: 0.3rem 0.6rem;
        font-size: 0.75rem;
      }
      .btn-danger:hover {
        border-color: #ff4444;
        color: #ff4444;
      }

      .spacer {
        flex: 1;
      }

      /* GENRE PICKER */
      .genre-picker {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        min-height: 2.4rem;
        padding: 0.4rem;
        background: var(--surface);
        border: 1px solid var(--border);
        transition: border-color 0.2s;
      }

      .genre-picker:focus-within {
        border-color: var(--accent);
      }

      .genre-chip {
        font-size: 0.72rem;
        padding: 0.2rem 0.6rem;
        background: rgba(232, 255, 71, 0.08);
        color: var(--muted);
        border: 1px solid var(--border);
        cursor: pointer;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        transition: all 0.15s;
        user-select: none;
      }

      .genre-chip:hover {
        color: var(--text);
        border-color: var(--text);
      }
      .genre-chip.selected {
        background: var(--accent);
        color: #0e0e0e;
        border-color: var(--accent);
      }

      /* MODAL */
      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        z-index: 100;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .overlay.open {
        display: flex;
      }

      .modal {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 2rem;
        width: 100%;
        max-width: 500px;
        animation: slideUp 0.2s ease;
        max-height: 90vh;
        overflow-y: auto;
      }

      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .modal h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.8rem;
        letter-spacing: 0.05em;
        margin-bottom: 1.5rem;
        color: var(--accent);
      }

      .form-grid {
        display: grid;
        gap: 1rem;
      }

      .form-group label {
        display: block;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
        margin-bottom: 0.4rem;
      }

      .form-group input,
      .form-group select {
        width: 100%;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .modal-actions {
        display: flex;
        gap: 0.75rem;
        margin-top: 1.5rem;
        justify-content: flex-end;
      }

      /* GENRE LIST no modal de gêneros */
      .genre-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        max-height: 300px;
        overflow-y: auto;
      }

      .genre-list-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.6rem 0.8rem;
        background: var(--bg);
        border: 1px solid var(--border);
        font-size: 0.85rem;
      }

      .genre-list-item:hover {
        border-color: var(--border);
        background: #111;
      }

      .genre-add-row {
        display: flex;
        gap: 0.5rem;
      }

      .genre-add-row input {
        flex: 1;
      }

      /* GRID */
      main {
        padding: 2rem 2.5rem;
      }

      .section-header {
        display: flex;
        align-items: baseline;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .section-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.2rem;
        letter-spacing: 0.1em;
        color: var(--muted);
        text-transform: uppercase;
      }

      .count-badge {
        font-size: 0.75rem;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 0.1rem 0.5rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1px;
        background: var(--border);
      }

      .card {
        background: var(--bg);
        padding: 1.5rem;
        transition: background 0.15s;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .card:hover {
        background: var(--surface);
      }

      .card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 0.5rem;
      }

      .card-title {
        font-size: 1rem;
        font-weight: 500;
        line-height: 1.3;
        flex: 1;
      }

      .badge {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 0.2rem 0.5rem;
        font-weight: 500;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .badge-filme {
        background: rgba(77, 166, 255, 0.15);
        color: var(--filme);
      }
      .badge-livro {
        background: rgba(167, 139, 250, 0.15);
        color: var(--livro);
      }
      .badge-jogo {
        background: rgba(52, 211, 153, 0.15);
        color: var(--jogo);
      }
      .badge-serie {
        background: rgba(251, 146, 60, 0.15);
        color: var(--serie);
      }

      .card-meta {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.8rem;
        color: var(--muted);
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot-quero {
        background: var(--muted);
      }
      .dot-em-andamento {
        background: var(--accent);
      }
      .dot-concluido {
        background: var(--jogo);
      }
      .dot-dropei {
        background: var(--accent2);
      }

      .rating {
        margin-left: auto;
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.1rem;
        letter-spacing: 0.05em;
      }

      .rating span {
        font-family: "DM Sans", sans-serif;
        font-size: 0.7rem;
        color: var(--muted);
      }

      .card-genres {
        display: flex;
        flex-wrap: wrap;
        gap: 0.3rem;
      }

      .card-genre-tag {
        font-size: 0.65rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border: 1px solid var(--border);
        padding: 0.1rem 0.4rem;
      }

      .card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: auto;
      }

      .card-date {
        font-size: 0.7rem;
        color: var(--border);
      }

      .empty {
        text-align: center;
        padding: 5rem 2rem;
        color: var(--muted);
      }
      .empty-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        opacity: 0.3;
      }

      .toast {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        background: var(--surface);
        border-left: 3px solid var(--accent);
        padding: 1rem 1.5rem;
        font-size: 0.85rem;
        z-index: 200;
        animation: fadeIn 0.2s ease;
        max-width: 300px;
      }

      .toast.error {
        border-color: #ff4444;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .loading {
        text-align: center;
        padding: 4rem;
        color: var(--muted);
        font-size: 0.85rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      @media (max-width: 600px) {
        header,
        .toolbar,
        main {
          padding: 1.25rem;
        }
        .header-stats {
          gap: 1.25rem;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">Opinião<br />da Casa<span>.</span></div>
      <div class="header-stats">
        <div class="stat"><strong id="stat-total">—</strong>títulos</div>
        <div class="stat"><strong id="stat-concluido">—</strong>concluídos</div>
        <div class="stat">
          <strong id="stat-andamento">—</strong>em andamento
        </div>
      </div>
    </header>

    <div class="toolbar">
      <select id="filter-type" onchange="applyFilters()">
        <option value="">Todos os tipos</option>
        <option value="filme">Filme</option>
        <option value="livro">Livro</option>
        <option value="jogo">Jogo</option>
        <option value="serie">Série</option>
      </select>

      <select id="filter-status" onchange="applyFilters()">
        <option value="">Todos os status</option>
        <option value="quero">Quero</option>
        <option value="em andamento">Em andamento</option>
        <option value="concluido">Concluído</option>
        <option value="dropei">Dropei</option>
      </select>

      <select id="filter-genre" onchange="applyFilters()">
        <option value="">Todos os gêneros</option>
      </select>

      <div class="spacer"></div>
      <button class="btn btn-ghost" onclick="openGenreModal()">Gêneros</button>
      <button class="btn btn-primary" onclick="openModal()">+ Adicionar</button>
    </div>

    <main>
      <div class="section-header">
        <span class="section-title">Watchlist</span>
        <span class="count-badge" id="count-badge">0</span>
      </div>
      <div id="grid" class="grid">
        <div class="loading">Carregando...</div>
      </div>
    </main>

    <!-- MODAL ITEM -->
    <div class="overlay" id="overlay" onclick="closeModalOutside(event)">
      <div class="modal">
        <h2 id="modal-title">Novo Título</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>Título</label>
            <input
              type="text"
              id="f-title"
              placeholder="Nome do filme, livro ou jogo"
            />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Tipo</label>
              <select id="f-type">
                <option value="filme">Filme</option>
                <option value="livro">Livro</option>
                <option value="jogo">Jogo</option>
                <option value="serie">Série</option>
              </select>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="f-status">
                <option value="quero">Quero</option>
                <option value="em andamento">Em andamento</option>
                <option value="concluido">Concluído</option>
                <option value="dropei">Dropei</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Nota (1–10)</label>
            <input
              type="number"
              id="f-rating"
              min="1"
              max="10"
              placeholder="—"
            />
          </div>
          <div class="form-group">
            <label>Gêneros — clique para selecionar</label>
            <div class="genre-picker" id="genre-picker"></div>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="saveItem()">Salvar</button>
        </div>
      </div>
    </div>

    <!-- MODAL GÊNEROS -->
    <div
      class="overlay"
      id="genre-overlay"
      onclick="closeGenreModalOutside(event)"
    >
      <div class="modal">
        <h2>Gêneros</h2>
        <div class="genre-list" id="genre-list"></div>
        <div class="genre-add-row">
          <input
            type="text"
            id="new-genre-input"
            placeholder="Novo gênero..."
          />
          <button class="btn btn-primary" onclick="createGenre()">
            Adicionar
          </button>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeGenreModal()">
            Fechar
          </button>
        </div>
      </div>
    </div>

    <script>
      const API = "http://192.168.15.6:8000";

      let allItems = [];
      let genres = [];
      let selectedGenreIds = new Set();
      let editingId = null;

      async function init() {
        await Promise.all([loadGenres(), loadItems()]);
      }

      async function loadItems() {
        const res = await fetch(API + "/items");
        allItems = await res.json();
        applyFilters();
        updateStats();
      }

      async function loadGenres() {
        const res = await fetch(API + "/genres");
        genres = await res.json();
        refreshGenreFilter();
        renderGenrePicker([]);
      }

      // atualiza o select de filtro sem duplicar opções
      function refreshGenreFilter() {
        const filterSel = document.getElementById("filter-genre");
        const current = filterSel.value;
        filterSel.innerHTML = '<option value="">Todos os gêneros</option>';
        genres.forEach((g) => {
          filterSel.innerHTML += `<option value="${g.id}">${g.name}</option>`;
        });
        filterSel.value = current;
      }

      // ── GENRE PICKER ──────────────────────────────────
      function renderGenrePicker(selectedIds) {
        selectedGenreIds = new Set(selectedIds);
        const picker = document.getElementById("genre-picker");
        picker.innerHTML = genres
          .map(
            (g) => `
          <span class="genre-chip ${selectedGenreIds.has(g.id) ? "selected" : ""}"
                onclick="toggleGenre(${g.id})">${g.name}</span>
        `,
          )
          .join("");
      }

      function toggleGenre(id) {
        if (selectedGenreIds.has(id)) {
          selectedGenreIds.delete(id);
        } else {
          selectedGenreIds.add(id);
        }
        document.querySelectorAll(".genre-chip").forEach((chip, i) => {
          chip.classList.toggle("selected", selectedGenreIds.has(genres[i].id));
        });
      }

      // ── GENRE MODAL ───────────────────────────────────
      function openGenreModal() {
        renderGenreList();
        document.getElementById("new-genre-input").value = "";
        document.getElementById("genre-overlay").classList.add("open");
      }

      function closeGenreModal() {
        document.getElementById("genre-overlay").classList.remove("open");
      }

      function closeGenreModalOutside(e) {
        if (e.target === document.getElementById("genre-overlay"))
          closeGenreModal();
      }

      function renderGenreList() {
        const list = document.getElementById("genre-list");
        if (genres.length === 0) {
          list.innerHTML = `<div style="color:var(--muted);font-size:0.85rem;padding:0.5rem 0">Nenhum gênero cadastrado.</div>`;
          return;
        }
        list.innerHTML = genres
          .map(
            (g) => `
          <div class="genre-list-item">
            <span>${g.name}</span>
            <button class="btn btn-danger" onclick="deleteGenre(${g.id})">✕</button>
          </div>
        `,
          )
          .join("");
      }

      async function createGenre() {
        const input = document.getElementById("new-genre-input");
        const name = input.value.trim();
        if (!name) {
          toast("Informe o nome do gênero", true);
          return;
        }

        const res = await fetch(API + "/genres", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name }),
        });

        if (res.ok) {
          input.value = "";
          await loadGenres();
          renderGenreList();
          renderGenrePicker([...selectedGenreIds]);
          toast("Gênero adicionado");
        } else {
          toast("Erro ao adicionar gênero", true);
        }
      }

      async function deleteGenre(id) {
        if (
          !confirm(
            "Remover este gênero? Ele será desassociado de todos os itens.",
          )
        )
          return;
        const res = await fetch(`${API}/genres/${id}`, { method: "DELETE" });
        if (res.ok) {
          await loadGenres();
          await loadItems();
          renderGenreList();
          renderGenrePicker([...selectedGenreIds].filter((gid) => gid !== id));
          toast("Gênero removido");
        } else {
          toast("Erro ao remover gênero", true);
        }
      }

      // ── FILTERS ───────────────────────────────────────
      function applyFilters() {
        const type = document.getElementById("filter-type").value;
        const status = document.getElementById("filter-status").value;
        const genre = document.getElementById("filter-genre").value;

        let filtered = allItems;
        if (type) filtered = filtered.filter((i) => i.type === type);
        if (status) filtered = filtered.filter((i) => i.status === status);
        if (genre)
          filtered = filtered.filter(
            (i) => i.genres && i.genres.some((g) => g.id == genre),
          );

        renderGrid(filtered);
      }

      // ── RENDER ────────────────────────────────────────
      function renderGrid(items) {
        const grid = document.getElementById("grid");
        document.getElementById("count-badge").textContent = items.length;

        if (items.length === 0) {
          grid.innerHTML = `
            <div class="empty" style="grid-column:1/-1">
              <div class="empty-icon">◻</div>
              <div>Nenhum título encontrado</div>
            </div>`;
          return;
        }

        const statusLabel = {
          quero: "Quero",
          "em andamento": "Em andamento",
          concluido: "Concluído",
          dropei: "Dropei",
        };

        grid.innerHTML = items
          .map((item) => {
            const date = item.created_at
              ? new Date(item.created_at).toLocaleDateString("pt-BR", {
                  day: "numeric",
                  month: "short",
                  year: "numeric",
                })
              : "";

            const genreTags =
              item.genres && item.genres.length
                ? item.genres
                    .map((g) => `<span class="card-genre-tag">${g.name}</span>`)
                    .join("")
                : "";

            const statusKey = item.status.replace(" ", "-");

            return `
            <div class="card">
              <div class="card-top">
                <div class="card-title">${item.title}</div>
                <span class="badge badge-${item.type}">${item.type}</span>
              </div>
              <div class="card-meta">
                <span class="status-dot dot-${statusKey}"></span>
                <span>${statusLabel[item.status] || item.status}</span>
                ${item.rating ? `<span class="rating">${item.rating}<span>/10</span></span>` : ""}
              </div>
              ${genreTags ? `<div class="card-genres">${genreTags}</div>` : ""}
              <div class="card-footer">
                <span class="card-date">${date}</span>
                <div style="display:flex;align-items:center;gap:0.5rem">
                  <button class="btn btn-danger" onclick="editItem(${item.id})">editar</button>
                  <button class="btn btn-danger" onclick="deleteItem(${item.id})">✕</button>
                </div>
              </div>
            </div>`;
          })
          .join("");
      }

      // ── STATS ─────────────────────────────────────────
      function updateStats() {
        document.getElementById("stat-total").textContent = allItems.length;
        document.getElementById("stat-concluido").textContent = allItems.filter(
          (i) => i.status === "concluido",
        ).length;
        document.getElementById("stat-andamento").textContent = allItems.filter(
          (i) => i.status === "em andamento",
        ).length;
      }

      // ── MODAL ITEM ────────────────────────────────────
      function openModal(item = null) {
        editingId = item ? item.id : null;
        document.getElementById("modal-title").textContent = item
          ? "Editar Título"
          : "Novo Título";
        document.getElementById("f-title").value = item ? item.title : "";
        document.getElementById("f-type").value = item ? item.type : "filme";
        document.getElementById("f-status").value = item
          ? item.status
          : "quero";
        document.getElementById("f-rating").value = item
          ? item.rating || ""
          : "";

        const selectedIds =
          item && item.genres ? item.genres.map((g) => g.id) : [];
        renderGenrePicker(selectedIds);

        document.getElementById("overlay").classList.add("open");
      }

      function closeModal() {
        document.getElementById("overlay").classList.remove("open");
        editingId = null;
        selectedGenreIds = new Set();
      }

      function closeModalOutside(e) {
        if (e.target === document.getElementById("overlay")) closeModal();
      }

      function editItem(id) {
        const item = allItems.find((i) => i.id === id);
        if (item) openModal(item);
      }

      // ── SAVE ──────────────────────────────────────────
      async function saveItem() {
        const title = document.getElementById("f-title").value.trim();
        if (!title) {
          toast("Informe o título", true);
          return;
        }

        const payload = {
          title,
          type: document.getElementById("f-type").value,
          status: document.getElementById("f-status").value,
          rating: document.getElementById("f-rating").value
            ? parseInt(document.getElementById("f-rating").value)
            : null,
          genres: [...selectedGenreIds],
        };

        const url = editingId ? `${API}/items/${editingId}` : `${API}/items`;
        const method = editingId ? "PUT" : "POST";

        const res = await fetch(url, {
          method,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (res.ok) {
          closeModal();
          await loadItems();
          toast(editingId ? "Título atualizado" : "Título adicionado");
        } else {
          toast("Erro ao salvar", true);
        }
      }

      // ── DELETE ITEM ───────────────────────────────────
      async function deleteItem(id) {
        if (!confirm("Remover este título?")) return;
        const res = await fetch(`${API}/items/${id}`, { method: "DELETE" });
        if (res.ok) {
          await loadItems();
          toast("Título removido");
        }
      }

      // ── TOAST ─────────────────────────────────────────
      function toast(msg, error = false) {
        const t = document.createElement("div");
        t.className = "toast" + (error ? " error" : "");
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
      }

      init();
    </script>
  </body>
</html>
